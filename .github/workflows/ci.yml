name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-flight runs for the same branch/PR to avoid wasting minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:

  # ─────────────────────────────────────────────────────────
  # Job 1: Code quality — ktlint + detekt
  # ─────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required for uploading SARIF to Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run ktlint
        run: ./gradlew ktlintCheckAll

      - name: Run detekt
        run: ./gradlew detektCheckAll

      - name: Collect and merge SARIF reports
        if: always()
        run: |
          mkdir -p build/sarif/modules
          find . -path "*/build/reports/detekt/detekt.sarif" | while IFS= read -r f; do
            module=$(echo "$f" | sed 's|/build/reports/detekt/detekt.sarif||' | sed 's|^\./||' | tr '/' '-')
            cp "$f" "build/sarif/modules/${module}-detekt.sarif"
          done
          # Merge all per-module SARIF files into one to satisfy the
          # "one SARIF run per category" requirement introduced in July 2025.
          if ls build/sarif/modules/*-detekt.sarif 1>/dev/null 2>&1; then
            jq -s '{
              "version": .[0].version,
              "$schema": .[0]."$schema",
              "runs": [{
                "tool": .[0].runs[0].tool,
                "results": [.[].runs[].results[]?],
                "artifacts": ([.[].runs[].artifacts[]?] | unique_by(.location.uri))
              }]
            }' build/sarif/modules/*-detekt.sarif > build/sarif/merged-detekt.sarif
          fi

      - name: Upload detekt results to GitHub Code Scanning
        if: always() && hashFiles('build/sarif/merged-detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/sarif/merged-detekt.sarif
          category: detekt

  # ─────────────────────────────────────────────────────────
  # Job 2: Unit tests
  # ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests and generate coverage reports
        run: ./gradlew test coverageReport

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/build/reports/coverage/**/*.xml"
          flags: unit-tests
          fail_ci_if_error: false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────
  # Job 3: Dependency guard — verifies compile + runtime
  #         classpath snapshots match the committed baselines
  #         in app/dependencies/*.txt
  # ─────────────────────────────────────────────────────────
  dependency-guard:
    name: Dependency Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Verify dependency snapshots
        run: ./gradlew dependencyGuard

  # ─────────────────────────────────────────────────────────
  # Job 4: Assemble debug APK
  # ─────────────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Job 5: Android Lint
  # ─────────────────────────────────────────────────────────
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-debug.html"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────
  # Job 6: Module dependency graph
  # Verifies that docs/module-graph.md matches the current
  # project wiring. Run ./gradlew generateModuleGraph locally
  # and commit the result whenever module dependencies change.
  # ─────────────────────────────────────────────────────────
  module-graph:
    name: Module Dependency Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate module graph
        run: ./gradlew generateModuleGraph

      - name: Verify module graph is up to date
        run: |
          if [ -n "$(git status --porcelain docs/module-graph.md)" ]; then
            echo "::error::docs/module-graph.md is outdated."
            echo "Run ./gradlew generateModuleGraph and commit the result."
            git diff docs/module-graph.md
            exit 1
          fi

      - name: Upload module graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-graph
          path: docs/module-graph.md
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────
  # Job 7: Instrumented tests (Compose UI tests)
  # Runs FeedScreenTest on an Android emulator.
  # Requires KVM acceleration — available on ubuntu-latest
  # via the nested virtualisation support added in 2024.
  # ─────────────────────────────────────────────────────────
  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Enable KVM group permissions for hardware-accelerated emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          # Disable window animations to avoid flakiness in Compose UI tests
          emulator-options: -no-snapshot -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: ./gradlew :feature:feed:impl:connectedDebugAndroidTest

      - name: Upload instrumented test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: "**/build/outputs/androidTest-results/"
          if-no-files-found: ignore
