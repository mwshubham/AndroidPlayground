name: APK Size Diff

# Runs only on pull requests targeting main.
# Builds the PR's debug APK, downloads the baseline from the last
# successful CI run on main, runs diffuse, and posts a comment.
on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: apk-diff-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:
  apk-size-diff:
    name: APK Size Diff
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # post / update PR comment
      actions: read         # download artifacts from other workflow runs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # ── Build the APK for this PR ─────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      # ── Fetch the baseline APK from the last successful ci.yml on main ─
      # continue-on-error keeps the job alive when no baseline exists yet
      # (e.g. the very first PR on the repo).
      - name: Download baseline APK from main
        id: download-baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: ci.yml
          branch: main
          name: debug-apk
          path: baseline-apk/
          if_no_artifact_found: warn

      # ── Resolve exact file paths (APK name can vary with versionName) ──
      - name: Locate APK files
        id: apk-paths
        if: steps.download-baseline.outcome == 'success'
        run: |
          NEW=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          OLD=$(find baseline-apk -name "*.apk" | head -1)
          if [[ -z "$NEW" || -z "$OLD" ]]; then
            echo "::error::Could not locate one or both APK files."
            exit 1
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"

      # ── Run diffuse ────────────────────────────────────────────────────
      - name: Run diffuse
        id: diffuse
        if: steps.apk-paths.outcome == 'success'
        uses: usefulness/diffuse-action@v1
        with:
          old-file-path: ${{ steps.apk-paths.outputs.old }}
          new-file-path: ${{ steps.apk-paths.outputs.new }}

      # ── Find any previous size-diff comment on this PR ─────────────────
      - name: Find existing size-diff comment
        id: find-comment
        if: steps.diffuse.outcome == 'success'
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- apk-size-diff -->"

      # ── Post or update the comment ─────────────────────────────────────
      - name: Post or update size diff comment
        if: steps.diffuse.outcome == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- apk-size-diff -->
            ## APK Size Diff

            ${{ steps.diffuse.outputs.diff-gh-comment }}

      # ── Graceful fallback when no baseline is available ────────────────
      - name: Skip (no baseline found)
        if: steps.download-baseline.outcome != 'success'
        run: |
          echo "::warning::No baseline APK artifact found on main — skipping size diff."
          echo "A baseline will be available after the next successful CI run on main."
