name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      suite:
        description: "Flow suite to run (smoke or all)"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - all

# Cancel in-flight runs for the same branch/PR to avoid wasting minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:

  e2e-tests:
    name: E2E Tests (Maestro)
    # macOS runners have hardware-accelerated emulation — no KVM setup needed
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run E2E tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          # macos-latest runners are Apple Silicon (ARM). Using arm64-v8a avoids
          # Rosetta x86_64 binary translation, which is the primary cause of
          # "Timeout waiting for emulator to boot" on ARM-hosted runners.
          arch: arm64-v8a
          target: google_apis
          disable-animations: true
          # Headless flags make the emulator boot significantly faster in CI:
          #   -no-snapshot   → skip slow snapshot restore/save
          #   -no-window     → no GUI needed in CI
          #   -no-audio      → skip audio subsystem initialisation
          #   -no-boot-anim  → skip boot animation (saves ~10–15 s)
          #   -gpu swiftshader_indirect → software GPU, avoids GPU driver issues
          emulator-options: -no-snapshot -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          # 10 minutes — arm64-v8a on Apple Silicon boots reliably within this window
          emulator-boot-timeout: 600
          script: |
            # Install Maestro CLI
            curl -fsSL "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"

            # Install the debug APK
            adb install -r app/build/outputs/apk/default/debug/app-default-debug.apk

            # Determine which suite to run
            SUITE="${{ github.event.inputs.suite || 'smoke' }}"
            if [ "$SUITE" = "all" ]; then
              maestro test maestro/flows/
            else
              maestro test maestro/flows/smoke/
            fi

      - name: Upload Maestro test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-artifacts
          path: ~/.maestro/tests/
          if-no-files-found: ignore
