name: Update Module Graph

# Runs on every push to main that touches a Gradle build file.
# Re-generates docs/module-graph.md and auto-commits it back to main
# so the file is always in sync without requiring manual updates.
on:
  push:
    branches: [ "main" ]
    paths:
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "**/build.gradle.kts"

# Only one auto-commit run should be active at a time on main.
concurrency:
  group: module-graph-update-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:
  update-module-graph:
    name: Regenerate & Commit Module Graph
    runs-on: ubuntu-latest

    # Write permission is required to push the auto-commit back to the branch.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that allows the pushed commit to trigger subsequent CI runs.
          # Falls back to the default GITHUB_TOKEN (which will NOT re-trigger CI — acceptable for graph-only commits).
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full history so git push works correctly.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Regenerate module graph
        run: ./gradlew generateModuleGraph

      - name: Commit updated module graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/module-graph.md
          if git diff --staged --quiet; then
            echo "docs/module-graph.md is already up to date — nothing to commit."
          else
            git commit -m "chore: auto-update module dependency graph [skip ci]"
            git push
            echo "Pushed updated docs/module-graph.md."
          fi
