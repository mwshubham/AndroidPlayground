coverage:
  # Overall project coverage: fail if it drops more than 1% below the target.
  status:
    project:
      default:
        target: auto      # use the base commit as the target
        threshold: 1%     # allow up to 1% drop before flagging a failure

    # Patch coverage: lines changed in a PR must be at least 80% covered.
    # Set lower than 100% because defensive null guards and Kotlin-generated
    # synthetic constructors are unreachable via the public test API and should
    # not block PRs.
    patch:
      default:
        target: 80%
        threshold: 5%

# Ignore files/paths that contain only unreachable defensive code, generated
# artefacts, or boilerplate that cannot be exercised through the public test API.
#
# Note: presentation/component/** is intentionally NOT ignored here — Paparazzi
# screenshot tests run on the JVM and produce real coverage data for composables.
#
# These paths mirror COVERAGE_EXCLUSIONS in AndroidLibraryConventionPlugin.kt
# and sonar.coverage.exclusions in the root build.gradle.kts.
ignore:
  # The ?: return guard in visitDotQualifiedExpression is a safety net for a
  # null calleeExpression that detekt's PSI parser never produces in practice.
  # Kotlin also emits a synthetic default-parameter constructor
  # (Config, Int, DefaultConstructorMarker) that is never called by tests.
  # Both are unreachable via io.gitlab.arturbosch.detekt.test.lint().
  - "custom-detekt-rules/src/main/kotlin/com/example/android/playground/detekt/ForbiddenAndroidLogCallRule.kt"

  # ── Hilt / Dagger generated ─────────────────────────────────────────────────
  - "**/hilt_aggregated_deps/**"

  # ── Pure-data MVI contracts (sealed interfaces and data classes, no logic) ──
  - "**/presentation/state/**"
  - "**/presentation/intent/**"
  - "**/presentation/sideeffect/**"
  - "**/presentation/model/**"

  # ── Screen-wiring composables (hiltViewModel() requires Hilt runtime) ───────
  - "**/presentation/screen/**"

  # ── Domain models (plain data classes) ──────────────────────────────────────
  - "**/domain/model/**"

  # ── DI wiring (@Module / @Provides / @Binds) ────────────────────────────────
  - "**/di/**"

  # ── API route objects (@Serializable data object NavKey) ────────────────────
  - "**/api/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true  # only post a comment when coverage changes
