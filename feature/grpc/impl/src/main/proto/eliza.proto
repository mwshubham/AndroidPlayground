syntax = "proto3";

package connectrpc.eliza.v1;

option java_multiple_files = true;
option java_outer_classname = "ElizaProto";
option java_package = "com.example.android.playground.grpc.proto";

message SayRequest {
  string sentence = 1;
}

message SayResponse {
  string sentence = 1;
}

service ElizaService {
  rpc Say(SayRequest) returns (SayResponse) {}
}
